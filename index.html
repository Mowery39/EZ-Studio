<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EZ Studio</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="page">

    <!-- Top bar -->
    <div class="top-bar">
      <h1 class="logo">EZ Studio</h1>
      <button class="info-btn">i</button>
    </div>

    <!-- Main content -->
<div class="main-content">

  <!-- CENTER -->
  <div class="center">

    <!-- Drum -->
    <img src="drum.png" alt="Drum" class="drum" />

    <!-- Main control -->
    <div class="main-control">
      <div class="up-arrow">
        <svg xmlns="http://www.w3.org/2000/svg" width="170" height="61" viewBox="0 0 170 61" fill="none">
          <path d="M127.5 38.125L85 22.875L42.5 38.125"
            stroke="#1E1E1E"
            stroke-width="8"
            stroke-linecap="round"
            stroke-linejoin="round"/>
        </svg>
      </div>
      <div class="play-bar"></div>
    </div>

  </div>

  <!-- RIGHT SIDE CONTROLS -->
  <div class="controls">

    <div class="control">
      <p>Pitch</p>
      <div class="arrow up"></div>
      <div class="arrow down"></div>
    </div>

    <div class="control">
      <p>Volume</p>
      <div class="arrow up"></div>
      <div class="arrow down"></div>
    </div>

    <div class="control">
      <p>Sound</p>
      <div class="arrow up"></div>
      <div class="arrow down"></div>
    </div>

  </div>

</div>

<div class="advanced-panel">
  <div class="advanced-arrow">
    <svg xmlns="http://www.w3.org/2000/svg" width="170" height="61" viewBox="0 0 170 61" fill="none">
      <path d="M127.5 38.125L85 22.875L42.5 38.125"
        stroke="#1E1E1E"
        stroke-width="8"
        stroke-linecap="round"
        stroke-linejoin="round"/>
    </svg>
  </div>
  <p>Advanced</p>
</div>
<div class="advanced-content">
  <div class="advanced-buttons">
    <div class="record-btn"></div>
    <div class="play-btn"></div>
    <div class="stop-btn"></div>
  </div>

  <div class="music-grid"></div>

  <div class="advanced-sliders">
    <label>Volume</label>
    <input type="range" />

    <label>Pitch</label>
    <input type="range" />

    <label>Sound</label>
    <input type="range" />
  </div>
</div>
<div class="bottom-bar"></div>

  </div>

  <script src="script.js"></script>
</body>
</html>
